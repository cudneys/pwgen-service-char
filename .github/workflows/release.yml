name: Build and push image

# Trigger only on pushed version tags like v1.2.3.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image and tag
        id: meta
        run: |
          set -euo pipefail
          # GITHUB_REF_NAME is the tag, e.g. "v1.2.3". Strip the leading "v"
          # so the pushed tag is "1.2.3" (and nothing else: no 1.2, no 1).
          version="${GITHUB_REF_NAME#v}"
          # GHCR requires a lowercase repository path.
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Pushing single tag: ${image}:${version}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Stamp the derived version into the binary so it appears in traces.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # Exactly one explicit tag. No metadata-action, so no extra
          # 1.2 / 1 / latest tags are ever generated.
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          # Avoid pushing extra provenance/SBOM manifests alongside the image.
          provenance: false
          sbom: false
