apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwgen-service-uppercase
  labels:
    app.kubernetes.io/name: pwgen-service-uppercase
spec:
  # replicas is intentionally omitted: the HorizontalPodAutoscaler below owns
  # the replica count (min 2). Setting it here would fight the HPA on re-apply.
  selector:
    matchLabels:
      app.kubernetes.io/name: pwgen-service-uppercase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pwgen-service-uppercase
    spec:
      # Pod-level hardening. Matches the scratch image, which runs as the
      # unprivileged numeric user 65534 (nobody) baked into the Dockerfile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across nodes when possible for availability.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pwgen-service-uppercase
      containers:
        - name: pwgen
          # Replace with your registry/tag, e.g. ghcr.io/cudneys/pwgen-service-uppercase:0.1.0
          image: ghcr.io/cudneys/pwgen-service-char:0.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PWGEN_ADDR
              value: ":8080"
            - name: LOG_LEVEL
              value: "info"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://lee-trace-ingest.apporto.com:443"
            # Bearer token for the OTLP ingest endpoint, sourced from the
            # "token" key of the otel-bearer-token secret.
            - name: OTEL_EXPORTER_OTLP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: otel-bearer-token
                  key: token
            # Surface the pod identity to the tracer as k8s.pod.name /
            # k8s.namespace.name resource attributes via the downward API.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PWGEN_CHARSET
              value: "ABCDEFGHIKJLMONPQRSTUVWXYZ"
          # The app comes up immediately; /healthz is a cheap liveness probe.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 64Mi
          # Container-level hardening. The static binary needs no writable
          # filesystem and no Linux capabilities.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: uppercase
  labels:
    app.kubernetes.io/name: pwgen-service-uppercase
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pwgen-service-uppercase
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pwgen-service-uppercase
  labels:
    app.kubernetes.io/name: pwgen-service-uppercase
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pwgen-service-uppercase
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
